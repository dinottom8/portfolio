<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mateus</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!--Texto, título, subtítulo e botão de baixar CV-->

    <section>
        <h1>Oi, sou Mateus!</h1>
        <h2>Desenvolvedor Front End</h2>
        <div id="divTextoApresentacao">
            <p id="textoApresentacao">Lorem ipsum dolor sit amet consectetur adipisicing elit. Harum 
                obcaecati dignissimos ipsa. Quibusdam numquam vero, facilis est ipsum, 
                nobis accusamus consectetur fuga in blanditiis minima esse autem, saepe ad quaerat!</p>
        </div>
        <button id="botaoBaixarCV">Baixar CV</button>
    </section>

    <!--Foto principal e forma de trás-->

    <div id="divFotoEForma">
        <img id="fotoPrincipal" src="images/pexels-jonathan-borba-16147939.jpg" alt="Foto perfil principal">
        <div id="formaTrásFoto"></div>
    </div>

    <!--Nav Side Bar-->

    <nav>
        <button class="botãoNavSideBar"><img src="images/person-circle.svg" alt="Ícone Pessoa"></button>
        <button class="botãoNavSideBar"><img src="images/file-text.svg" alt="Ícone Arquivo"></button>
        <button class="botãoNavSideBar"><img src="images/briefcase.svg" alt="Ícone Maleta"></button>
        <button class="botãoNavSideBar"><img src="images/columns-gap.svg" alt="Ícone Projetos"></button>
        <button class="botãoNavSideBar"><img src="images/envelope.svg" alt="Ícone Email"></button>
    </nav>

    <!--Social Icons-->

    <div id="divSocialIcons">
        <div><img src="images/whatsapp.svg" alt="Ícone Whatsapp"></div>
        <div><img src="images/github.svg" alt="Ícone Github"></div>
        <div><img src="images/telegram.svg" alt="Ícone Telegram"></div>
        <div><img src="images/linkedin.svg" alt="Ícone Linkedin"></div>
        <div><img src="images/instagram.svg" alt="Ícone Instagram"></div>
    </div>

</body>
</html>
