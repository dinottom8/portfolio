<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mateus</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!--Texto, título, subtítulo e botão de baixar CV-->

    <div class="paginaUm" id="divApresentacaoPaginaUm">
        <h1>Oi, sou Mateus!</h1>
        <h2>Desenvolvedor Front-End</h2>
        <div id="divTextoApresentacao">
            <p id="textoApresentacao">Aplicações modernas, responsivas, com experiências incríveis e
                acessibilidade são o meu objetivo. Vamos fazer algo grandioso juntos!
            </p>
        </div>
        <button id="botaoBaixarCV">Baixar CV</button>
    </div>

    <!--Foto principal e forma de trás-->

    <div id="divFotoEForma" class="paginaUm">    
        <img id="fotoPrincipal" src="images/pexels-jonathan-borba-16147939.jpg" alt="Foto perfil principal">
        <div id="formaTrásFoto"></div>
    </div>

    <!--Nav Side Bar-->

    <nav>
        <button id="botaoPaginaInicial" class="botãoNavSideBar"><img src="images/person-circle.svg" alt="Ícone Pessoa"></button>
        <button id="botaoPaginaCompetencias" class="botãoNavSideBar"><img src="images/file-text.svg" alt="Ícone Arquivo"></button>
        <button class="botãoNavSideBar"><img src="images/briefcase.svg" alt="Ícone Maleta"></button>
        <button class="botãoNavSideBar"><img src="images/columns-gap.svg" alt="Ícone Projetos"></button>
        <button class="botãoNavSideBar"><img src="images/envelope.svg" alt="Ícone Email"></button>
    </nav>

    <!--Social Icons-->

    <div id="divSocialIcons">
        <img class="socialIconAnimation" src="images/whatsapp.svg" alt="Ícone Whatsapp">
        <img class="socialIconAnimation" src="images/github.svg" alt="Ícone Github">
        <img class="socialIconAnimation" src="images/telegram.svg" alt="Ícone Telegram">
        <img class="socialIconAnimation" src="images/linkedin.svg" alt="Ícone Linkedin">
        <img class="socialIconAnimation" src="images/instagram.svg" alt="Ícone Instagram">
    </div>

    <script src="app.js"></script>

</body>
</html>
