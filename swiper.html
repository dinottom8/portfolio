<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Swiper demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    <style>
        swiper-container {
            width: 100%;
            height: 100%;
            color: #cd4de8;
        }

        swiper-slide {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        swiper-slide img {
            display: block;
            width: 100%;
        }

        i {
            color: #cd4de8;
            font-size: 70px;
        }

        
        @media screen and (max-width: 1280px) {

            .projeto-card{
                width: 188px;
                height: 224px;
            }
        }

        @media screen and (max-width: 500px) {
            .carousel-next-custom, .carousel-prev-custom {
                display: none;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <swiper-container class="mySwiper" init="false">
            
        </swiper-container>
        <button class="btn carousel-prev-custom" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
            <i class="bi bi-arrow-left-circle-fill"></i>
            <span class="visually-hidden">Prev</span>
        </button>

        <button class="btn carousel-next-custom" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
            <i class="bi bi-arrow-right-circle-fill"></i>
            <span class="visually-hidden">Prev</span>
        </button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/swiper@9/swiper-element-bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.0.js"
        integrity="sha256-JlqSTELeR4TLqP0OG9dxM7yDPqX1ox/HfgiSLBj8+kM=" crossorigin="anonymous"></script>
    <script src="bg.js"></script>

    <script src="data.js"></script>
    <script>
        const swiperEl = document.querySelector('swiper-container');

        const params = {
            centeredSlides: false,


            navigation: {
                nextEl: '.carousel-next-custom',
                prevEl: '.carousel-prev-custom',
            },

            grabCursor: true,
            keyboard: {
                enabled: true,
            },
            breakpoints: {
                769: {
                    slidesPerView: 4,
                    slidesPerGroup: 4,
                },
                480: {
                    slidesPerView: 1,
                    slidesPerGroup: 1,
                }
            },
        };

        Object.assign(swiperEl, params)

        swiperEl.initialize();
    </script>
</body>

</html>
